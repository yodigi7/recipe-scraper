version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/producer"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      producer-deps:
        patterns: ["*"]

  - package-ecosystem: "pip"
    directory: "/worker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      worker-deps:
        patterns: ["*"]

  - package-ecosystem: "docker"
    directories:
      - "/producer"
      - "/worker"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      docker-images:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
